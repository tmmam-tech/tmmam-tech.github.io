<body>
    <nav>
        <a href="index.html" style="color: #d4af37;">🏠 الرئيسية</a>

    <div class="container">

        <h1>تمام للتقنية</h1>
        <p class="subtitle">tmmam tech</p>
        <div class="line"></div>

        <!-- التأثير الكتابي الحيوي يعرض الجمل التي تحبها -->
        <div class="typing-box">
            <span class="typing-text" id="typingText"></span>
            <span class="cursor-blink"></span>
        </div>

        <a href="about.html" class="btn">من أنا؟</a>

            تصميم — <span>tmmam تمام</span> ❤️
        </div>
    </div>

    <!-- سكريبت التأثير الكتابي -->
    <script>
        // الجمل التي ستظهر بالتناوب (نفس الروح التي تحبها)
        const words = [
            "رحلة شغف وإبداع في عالم التقنية.",
            "هنا ستجد مواضيع مفيدة ونادرة في الويب والبرامج والتقنيات .",
            "تجارب ونصائح في البرامج والتطبيقات.",
            "رحلة تعلم ومشاركة مستمرة."
        ];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const span = document.getElementById("typingText");

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                span.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                span.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let timeout;
            if (!isDeleting && charIndex === currentWord.length) {
                timeout = 2500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                timeout = 300;
            } else {
                timeout = isDeleting ? 30 : 50;
            }
            setTimeout(type, timeout);
        }
        type();
        <script>
// استخدم الرابط المباشر لـ InfinityFree
const counterUrl = 'https://tmmamfiles.infinityfreeapp.com/counter.php';

async function fetchCounter() {
    try {
        const response = await fetch(counterUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('Network error');
        const count = await response.text();
        const span = document.getElementById('tmmam-visit-count');
        if (span && count) {
            span.textContent = count.trim();
            span.style.transform = 'scale(1.4)';
            setTimeout(() => { span.style.transform = 'scale(1)'; }, 300);
        }
    } catch (e) {
        document.getElementById('tmmam-visit-count').textContent = '0';
        console.error('Counter error:', e);
    }
}
fetchCounter();
</script>
    </script>
