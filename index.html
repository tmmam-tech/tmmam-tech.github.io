<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        nav a {

        }
        nav a:hover { color: #d4af37; }
        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            font-size: 2.8em;
            color: #d4af37;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
        }
        .line {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 30px;
        }
        /* التأثير الكتابي */
        .typing-box {
            font-size: 1.4em;
            color: #d0d0d0;
            margin-bottom: 25px;
            min-height: 2em;
        }
        .typing-text {
            color: #d4af37;
            font-weight: 600;
        }
        .cursor-blink {
            display: inline-block;
            background: #d4af37;
            width: 2px;
            height: 1.2em;
            margin-right: 4px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .btn {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 12px 32px;
            font-size: 1.1em;
            border-radius: 30px;

        .footer {

        }

    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="color: #d4af37;">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html">🔗 روابط</a>
        <a href="https://files.tmmamtech.xyz">☁️ استضافة الملفات</a>
        <a href="https://blog.tmmamtech.xyz">📰 المدونة</a>
    </nav>

    <div class="container">
        <img src="tech-logo.png" alt="تمام للتقنية" class="avatar">
        <h1>تمام للتقنية</h1>
        <p class="subtitle">tmmam tech</p>
        <div class="line"></div>

        <!-- التأثير الكتابي الحيوي يعرض الجمل التي تحبها -->
        <div class="typing-box">
            <span class="typing-text" id="typingText"></span>
            <span class="cursor-blink"></span>
        </div>

        <a href="about.html" class="btn">من أنا؟</a>
        <a href="links.html" class="btn">روابط التواصل</a>

        <div class="footer">
            تصميم — <span>tmmam تمام</span> ❤️
        </div>
    </div>

    <!-- سكريبت التأثير الكتابي -->
    <script>
        // الجمل التي ستظهر بالتناوب (نفس الروح التي تحبها)
        const words = [
            "رحلة شغف وإبداع في عالم التقنية.",
            "هنا ستجد مواضيع مفيدة ونادرة في الويب والبرامج والتقنيات .",
            "تجارب ونصائح في البرامج والتطبيقات.",
            "رحلة تعلم ومشاركة مستمرة."
        ];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const span = document.getElementById("typingText");

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                span.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                span.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let timeout;
            if (!isDeleting && charIndex === currentWord.length) {
                timeout = 2500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                timeout = 300;
            } else {
                timeout = isDeleting ? 30 : 50;
            }
            setTimeout(type, timeout);
        }
        type();
    </script>
    <!-- ========== سلايدر أحدث المقالات من المدونة ========== -->
<style>
    .posts-slider-wrapper {
        max-width: 600px;
        margin: 40px auto;
        text-align: center;
    }
    .posts-slider-title {
        color: #d4af37;
        font-size: 1.4em;
        margin-bottom: 20px;
    }
    .posts-slider {
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        padding: 25px;
        min-height: 120px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(212,175,55,0.15);
    }
    .post-slide {
        opacity: 0;
        transition: opacity 0.6s ease;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        text-align: center;
    }
    .post-slide.active {
        opacity: 1;
        position: relative;
    }
    .post-slide-title {
        font-size: 1.3em;
        font-weight: bold;
        margin-bottom: 8px;
    }
    .post-slide-title a {
        color: #d4af37;
        text-decoration: none;
    }
    .post-slide-title a:hover {
        text-decoration: underline;
    }
    .post-slide-date {
        color: #888;
        font-size: 0.85em;
        margin-bottom: 6px;
    }
    .post-slide-snippet {
        color: #b0b0b0;
        font-size: 0.95em;
        line-height: 1.6;
    }
    .slider-nav {
        margin-top: 15px;
    }
    .slider-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: #2a2a2a;
        border-radius: 50%;
        margin: 0 5px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .slider-dot.active-dot {
        background: #d4af37;
    }
</style>

<div class="posts-slider-wrapper">
    <div class="posts-slider-title">📰 أحدث المقالات من المدونة</div>
    <div class="posts-slider" id="posts-slider"></div>
    <div class="slider-nav" id="slider-nav"></div>
</div>

<script>
    const feedURL = 'https://blog.tmmamtech.xyz/feeds/posts/default?alt=json&max-results=5';
    const sliderContainer = document.getElementById('posts-slider');
    const navContainer = document.getElementById('slider-nav');

    async function loadPosts() {
        try {
            const response = await fetch(feedURL);
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            const entries = data.feed.entry || [];
            if (entries.length === 0) {
                sliderContainer.innerHTML = '<p style="color:#888;">لا توجد مقالات بعد.</p>';
                return;
            }

            // إعداد الشرائح
            entries.forEach((entry, index) => {
                const title = entry.title.$t;
                const link = entry.link.find(l => l.rel === 'alternate').href;
                const date = new Date(entry.published.$t).toLocaleDateString('ar-SA');
                // استخراج المقتطف (قد يكون في summary أو content)
                let snippet = '';
                if (entry.summary) {
                    snippet = entry.summary.$t.replace(/<[^>]+>/g, '').substring(0, 120) + '...';
                }
                const slide = document.createElement('div');
                slide.className = `post-slide ${index === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="post-slide-title"><a href="${link}" target="_blank">${title}</a></div>
                    <div class="post-slide-date">📅 ${date}</div>
                    <div class="post-slide-snippet">${snippet}</div>
                `;
                sliderContainer.appendChild(slide);

                // نقطة التنقل
                const dot = document.createElement('span');
                dot.className = `slider-dot ${index === 0 ? 'active-dot' : ''}`;
                dot.addEventListener('click', () => goToSlide(index));
                navContainer.appendChild(dot);
            });

            // بدء السلايدر التلقائي
            if (entries.length > 1) {
                let current = 0;
                setInterval(() => {
                    const next = (current + 1) % entries.length;
                    goToSlide(next);
                }, 5000);
            }
        } catch (e) {
            sliderContainer.innerHTML = '<p style="color:#888;">تعذر تحميل المقالات حالياً.</p>';
            console.error(e);
        }
    }

    function goToSlide(index) {
        const slides = document.querySelectorAll('.post-slide');
        const dots = document.querySelectorAll('.slider-dot');
        slides.forEach(s => s.classList.remove('active'));
        dots.forEach(d => d.classList.remove('active-dot'));
        if (slides[index]) slides[index].classList.add('active');
        if (dots[index]) dots[index].classList.add('active-dot');
    }

    loadPosts();
</script>
