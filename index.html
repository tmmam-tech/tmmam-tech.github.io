<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمام للتقنية | tmmam tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        /* شريط التنقل */
        nav {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin: 0 18px;
            font-weight: 600;
            font-size: 1.05em;
            transition: 0.3s;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        /* الصورة الرمزية */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
            box-shadow: 0 0 25px rgba(212,175,55,0.3);
            margin-bottom: 25px;
            background: #0a0a0a;
        }
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .line {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 30px;
            border-radius: 1px;
        }
        /* تأثير الكتابة */
        #typewriter {
            font-size: 1.3em;
            color: #d0d0d0;
            margin-bottom: 18px;
            line-height: 1.8;
            font-weight: 400;
            min-height: 2em;
        }
        .cursor {
            display: inline-block;
            background: #d4af37;
            width: 2px;
            height: 1.2em;
            margin-right: 4px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .highlight {
            color: #d4af37;
            font-weight: 600;
        }
        .btn {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 12px 32px;
            font-size: 1.1em;
            border-radius: 30px;
            text-decoration: none;
            margin: 10px 8px;
            transition: 0.3s ease;
            font-weight: 500;
        }
        .btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }
        .badge {
            background: #d4af37;
            color: #0a0a0a;
            font-size: 0.7em;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        /* عداد الزوار */
        .visitor-count {
            margin-top: 30px;
            font-size: 0.95em;
            color: #888;
        }
        .visitor-count span {
            color: #d4af37;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #777;
        }
        .footer span {
            color: #d4af37;
        }
   /* إطار الحاوية للحركة */
.logo-container {
    display: inline-block;
    border-radius: 50%;
    margin-bottom: 25px;
}

/* تفعيل الأنيميشن */
.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #d4af37;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    background: #0a0a0a;
    animation: luxPulse 3s ease-in-out infinite;
    transition: 0.3s;
}

/* تعريف النبض الذهبي الفاخر */
@keyframes luxPulse {
    0% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 35px rgba(212, 175, 55, 0.9), 0 0 60px rgba(212, 175, 55, 0.3);
        transform: scale(1.03);
    }
    100% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        transform: scale(1);
    }
} </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html">🔗 روابط</a>
    </nav>

    <div class="main-content">
        <div class="container">
            <!-- صورة رمزية حقيقية (مولّدة تلقائياً) -->
            <!-- شعار متحرك احترافياً بواسطة CSS -->
<div class="logo-container">
    <img src="tech-logo" alt="شعار تمام للتقنية" class="avatar">
</div>
            <h1>تمام للتقنية</h1>
            <div class="subtitle">tmmam tech</div>
            <div class="line"></div>

            <!-- تأثير الكتابة -->
            <div id="typewriter"></div>

            <p class="description" style="font-size:1.1em; color:#c0c0c0;">
                هنا ستجد مواضيع <span class="highlight">مفيدة ونادرة</span> في الويب والبرامج والتقنيات الحديثة.
            </p>

            <a href="about.html" class="btn">من أنا؟</a>
            <a href="links.html" class="btn">
                روابط التواصل
                <span class="badge">جديد</span>
            </a>

            <!-- عداد الزوار -->
            <div class="visitor-count">
                👁️ أنت الزائر رقم <span id="visitCount">0</span> لهذا الموقع
            </div>

            <div class="footer">
                تصميم — <span>tmmam تمام ❤️</span>
            </div>
        </div>
    </div>

    <!-- سكريبت تأثير الكتابة وعداد الزوار -->
    <script>
        // ===== تأثير الكتابة =====
        (function() {
            const text = "رحلة شغف وإبداع في عالم التقنية.";
            const speed = 60; // سرعة الكتابة (مللي ثانية)
            const container = document.getElementById("typewriter");
            let index = 0;

            function type() {
                if (index < text.length) {
                    container.innerHTML += text.charAt(index);
                    index++;
                    setTimeout(type, speed);
                } else {
                    // بعد الانتهاء، نضيف المؤشر الوامض
                    const cursor = document.createElement("span");
                    cursor.className = "cursor";
                    container.appendChild(cursor);
                }
            }

            // بدء الكتابة بعد تحميل الصفحة بقليل
            window.addEventListener("load", () => {
                setTimeout(type, 400);
            });
        })();

        // ===== عداد الزوار (محلي، يعتمد على المتصفح) =====
        (function() {
            const countSpan = document.getElementById("visitCount");
            let count = localStorage.getItem("tmmam_visits");
            if (!count) {
                count = 1;
            } else {
                count = parseInt(count) + 1;
            }
            localStorage.setItem("tmmam_visits", count);
            countSpan.textContent = count;
        })();
    </script>
</body>
</html>
