<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمام للتقنية | tmmam tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        /* شريط التنقل */
        nav {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin: 0 18px;
            font-weight: 600;
            font-size: 1.05em;
            transition: 0.3s;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        /* المحتوى الرئيسي */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .line {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 30px;
            border-radius: 1px;
        }
        .description {
            font-size: 1.3em;
            color: #d0d0d0;
            margin-bottom: 18px;
            line-height: 1.8;
            font-weight: 400;
        }
        .highlight {
            color: #d4af37;
            font-weight: 600;
        }
        .btn {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 12px 32px;
            font-size: 1.1em;
            border-radius: 30px;
            text-decoration: none;
            margin: 10px 8px;
            transition: 0.3s ease;
            font-weight: 500;
            position: relative;
        }
        .btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #777;
        }
        .footer span {
            color: #d4af37;
        }
    </style>
</head>
<body>
    <!-- شريط التنقل العلوي -->
    <nav>
        <a href="index.html" class="active">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html">🔗 روابط</a>
    </nav>

    <!-- المحتوى الرئيسي للصفحة -->
    <div class="main-content">
        <div class="container">
            <div class="emoji">💻🚀</div>
            <h1>تمام للتقنية</h1>
            <div class="subtitle">tmmam tech</div>
            <div class="line"></div>
            <p class="description">
                رحلة شغف وإبداع في عالم التقنية.
            </p>
            <p class="description">
                هنا ستجد مواضيع <span class="highlight">مفيدة ونادرة</span> في الويب والبرامج والتقنيات الحديثة.
            </p>
            <a href="about.html" class="btn">من أنا؟</a>
            <a href="links.html" class="btn">
                روابط التواصل
                <span style="
                    background: #d4af37;
                    color: #0a0a0a;
                    font-size: 0.7em;
                    font-weight: bold;
                    padding: 3px 8px;
                    border-radius: 12px;
                    margin-right: 8px;
                    animation: pulse 1.5s infinite;
                ">جديد</span>
            </a>
            <div class="footer">
                تصميم — <span>tmmam تمام ❤️</span>
            </div>
        </div>
    </div>
</body>
</html>
