<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة — تمام للتقنية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* شبكة متحركة */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }
        nav {
            background: rgba(17,17,17,0.9);
            border-bottom: 1px solid #2a2a2a;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin: 0 14px;
            font-weight: 600;
            transition: 0.3s;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }
        .calculator {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 25px 20px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .display {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 2em;
            color: #d4af37;
            min-height: 60px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        button:hover {
            background: #2a2a2a;
            border-color: #d4af37;
            color: #d4af37;
        }
        button.operator {
            color: #d4af37;
            font-weight: bold;
        }
        button.equals {
            background: #d4af37;
            color: #0a0a0a;
            font-weight: bold;
            border: none;
        }
        button.equals:hover {
            background: #e0c04a;
        }
        button.clear {
            color: #ff6b6b;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.85em;
            color: #666;
        }
        .footer span { color: #d4af37; }
        .visitor-count {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
        .visitor-count span { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html">🔗 روابط</a>
        <a href="calculator.html" class="active">🧮 آلة حاسبة</a>
        <a href="upload.html">☁️ رفع ملفات</a>
        <a href="http://tmmamfiles.infinityfreeapp.com" target="_blank">☁️ استضافة الملفات</a>
        <a href="http://tmmamtech.blogspot.com" target="_blank">📰 المدونة</a>
    </nav>

    <div class="main-content">
        <div class="calculator">
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="appendOperator('-')">−</button>
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('.')">.</button>
                <button class="equals" onclick="calculate()">=</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                <button class="clear" onclick="clearAll()" style="grid-column: span 2;">مسح الكل</button>
                <button onclick="deleteLast()" style="grid-column: span 2;">حذف الأخير</button>
            </div>
            <div class="footer">
                تصميم — <span>tmmam تمام ❤️</span>
            </div>
            <div class="visitor-count">
                👁️ أنت الزائر رقم <span id="visitCount">0</span>
            </div>
        </div>
    </div>

    <script>
        // ===== خلفية شبكية =====
        (function() {
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            let w, h;
            const particles = [];
            const particleCount = 40;
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    r: Math.random() * 1.5 + 0.5
                });
            }
            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.strokeStyle = "#d4af37";
                ctx.fillStyle = "rgba(212,175,55,0.3)";
                ctx.lineWidth = 0.5;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 110) {
                            ctx.globalAlpha = 0.08 * (1 - dist / 110);
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ===== منطق الآلة الحاسبة =====
        let displayValue = "0";
        let firstOperand = null;
        let operator = null;
        let waitingForSecondOperand = false;
        const display = document.getElementById("display");
        function updateDisplay() { display.textContent = displayValue; }
        function appendNumber(num) {
            if (waitingForSecondOperand) {
                displayValue = num;
                waitingForSecondOperand = false;
            } else {
                displayValue = displayValue === "0" ? num : displayValue + num;
            }
            updateDisplay();
        }
        function appendOperator(op) {
            const inputValue = parseFloat(displayValue);
            if (operator && waitingForSecondOperand) { operator = op; return; }
            if (firstOperand === null) { firstOperand = inputValue; }
            else if (operator) {
                const result = performCalculation(firstOperand, inputValue, operator);
                displayValue = String(result);
                firstOperand = result;
            }
            waitingForSecondOperand = true;
            operator = op;
            updateDisplay();
        }
        function performCalculation(first, second, op) {
            switch (op) {
                case '+': return first + second;
                case '-': return first - second;
                case '*': return first * second;
                case '/': return second !== 0 ? first / second : "خطأ";
                default: return second;
            }
        }
        function calculate() {
            if (operator && !waitingForSecondOperand) {
                const inputValue = parseFloat(displayValue);
                const result = performCalculation(firstOperand, inputValue, operator);
                displayValue = String(result);
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                updateDisplay();
            }
        }
        function clearAll() {
            displayValue = "0";
            firstOperand = null;
            operator = null;
            waitingForSecondOperand = false;
            updateDisplay();
        }
        function deleteLast() {
            if (displayValue.length > 1) {
                displayValue = displayValue.slice(0, -1);
            } else {
                displayValue = "0";
            }
            updateDisplay();
        }

        // ===== عداد الزوار =====
        (function() {
            const countSpan = document.getElementById("visitCount");
            let count = localStorage.getItem("tmmam_visits_calc");
            if (!count) { count = 1; }
            else { count = parseInt(count) + 1; }
            localStorage.setItem("tmmam_visits_calc", count);
            countSpan.textContent = count;
        })();
    </script>
</body>
</html>
