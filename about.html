<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من أنا؟ — تمام للتقنية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            width: 100%;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .location {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .line {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 25px;
            border-radius: 1px;
        }
        .bio {
            font-size: 1.2em;
            color: #d0d0d0;
            line-height: 2;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
        }
        .highlight {
            color: #d4af37;
            font-weight: 600;
        }
        .section-title {
            font-size: 1.3em;
            color: #d4af37;
            margin: 30px 0 15px;
            font-weight: 600;
        }
        .list {
            list-style: none;
            padding: 0;
            text-align: right;
            display: inline-block;
        }
        .list li {
            font-size: 1.15em;
            color: #c0c0c0;
            margin: 12px 0;
            padding-right: 20px;
            position: relative;
        }
        .list li::before {
            content: "▹";
            color: #d4af37;
            position: absolute;
            right: 0;
        }
        .btn {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 12px 32px;
            font-size: 1.1em;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 20px;
            transition: 0.3s ease;
            font-weight: 500;
        }
        .btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👨‍💻</div>
        <h1>تمام</h1>
        <!-- العلم السوري الجديد -->
<div style="width: 80px; height: 50px; margin: 10px auto 20px; position: relative;">
  <div style="background:#006b3f; height:33.33%; width:100%;"></div>
  <div style="background:#ffffff; height:33.33%; width:100%; position:relative; text-align:center; line-height:16px;">
    <span style="color:#ce1126; font-size:16px; letter-spacing:6px; display:inline-block; position:relative; top:-4px;">★★★</span>
  </div>
  <div style="background:#000000; height:33.33%; width:100%;"></div>
</div>
<div class="location"> من سوريا</div>
        <div class="line"></div>
        <div class="bio">
            <p>أهلاً بك في <span class="highlight">تمام للتقنية</span>.</p>
            <p>أنت في المكان الصحيح.</p>
            <p>هنا ستجد مواضيع <span class="highlight">مفيدة ونادرة</span> في الويب والبرامج والتقنيات الحديثة.</p>
        </div>
        <div class="section-title">💡 ماذا أقدّم؟</div>
        <ul class="list">
            <li>تجارب ونصائح في البرامج والتطبيقات</li>
            <li>محتوى تقني نادر ومفيد</li>
            <li>رحلة تعلم ومشاركة مستمرة</li>
        </ul>
        <a href="index.html" class="btn">🏠 العودة للرئيسية</a>
        <div class="footer">
            تصميم — tmmam تمام ❤️
        </div>
    </div>
</body>
</html>
