<script>
    (function() {
        const span = document.getElementById("tmmam-visit-count");
        if (!span) return;
        // استخدم مفتاحاً موحداً لكل صفحة إن أردت، أو واحداً لجميع الصفحات
        const storageKey = "tmmam_visits_home"; 
        let count = localStorage.getItem(storageKey);
        if (!count) {
            count = 1;
        } else {
            count = parseInt(count) + 1;
        }
        localStorage.setItem(storageKey, count);
        span.textContent = count;
        // تأثير بسيط
        span.style.transform = "scale(1.4)";
        setTimeout(() => { span.style.transform = "scale(1)"; }, 300);
    })();
</script>
