<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط — تمام للتقنية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        /* شريط التنقل */
        nav {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin: 0 18px;
            font-weight: 600;
            font-size: 1.05em;
            transition: 0.3s;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover,
        nav a.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        /* المحتوى الرئيسي */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #b8930f);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3em;
        }
        h1 {
            font-size: 2em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .bio {
            font-size: 1em;
            color: #b0b0b0;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .line {
            width: 50px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 25px;
            border-radius: 1px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            padding: 15px 25px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 1.15em;
            font-weight: 500;
            transition: 0.3s ease;
        }
        .link-btn:hover {
            background: #1a1a1a;
            border-color: #d4af37;
            color: #d4af37;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        }
        .icon {
            font-size: 1.4em;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.85em;
            color: #666;
        }
        .footer span {
            color: #d4af37;
        }
    </style>
</head>
<body>
    <!-- شريط التنقل -->
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html" class="active">🔗 روابط</a>
    </nav>

    <!-- المحتوى -->
    <div class="main-content">
        <div class="container">
            <!-- صورة رمزية -->
            <div class="avatar">👨‍💻</div>
            
            <h1>تمام</h1>
            <p class="bio">تمام للتقنية | tmmam tech</p>
            <div class="line"></div>

            <!-- قائمة الروابط -->
            <div class="links">
                <a href="https://github.com/tmmam-tech" target="_blank" class="link-btn">
                    <span class="icon">🐙</span>
                    GitHub
                </a>
                <a href="https://t.me/" target="_blank" class="link-btn">
                    <span class="icon">✈️</span>
                    تلغرام
                </a>
                <a href="https://youtube.com/" target="_blank" class="link-btn">
                    <span class="icon">▶️</span>
                    يوتيوب
                </a>
                <a href="index.html" class="link-btn">
                    <span class="icon">🌐</span>
                    موقعي الشخصي
                </a>
                <a href="about.html" class="link-btn">
                    <span class="icon">👤</span>
                    من أنا؟
                </a>
            </div>

            <!-- توقيع -->
            <div class="footer">
                تصميم — <span>tmmam تمام ❤️</span>
            </div>
        </div>
    </div>
</body>
</html>
