<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع الملفات — تمام للتقنية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }
        nav {
            background: rgba(17,17,17,0.9);
            border-bottom: 1px solid #2a2a2a;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin: 0 14px;
            font-weight: 600;
            transition: 0.3s;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }
        .upload-container {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 { color: #d4af37; margin-bottom: 10px; }
        .subtitle { color: #b0b0b0; margin-bottom: 25px; font-size: 0.95em; }
        .drop-zone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 20px;
            transition: 0.3s;
            cursor: pointer;
            background: #0a0a0a;
        }
        .drop-zone:hover, .drop-zone.drag-active {
            border-color: #d4af37;
            background: #1a1a1a;
        }
        .drop-zone .icon { font-size: 3em; margin-bottom: 10px; }
        .drop-zone p { color: #888; margin: 5px 0; }
        .drop-zone .browse { color: #d4af37; text-decoration: underline; cursor: pointer; }
        input[type="file"] { display: none; }
        .file-list { text-align: right; margin-bottom: 20px; }
        .file-item {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }
        .file-name { color: #e0e0e0; }
        .file-size { color: #888; font-size: 0.8em; }
        .remove-file { color: #ff6b6b; cursor: pointer; background: none; border: none; font-size: 1.2em; }
        .progress-container { margin-bottom: 20px; display: none; }
        .progress-bar { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #d4af37; width: 0%; border-radius: 10px; transition: width 0.3s; }
        .btn {
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            padding: 14px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background: #e0c04a; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            text-align: right;
            display: none;
        }
        .result a { color: #d4af37; word-break: break-all; }
        .footer { margin-top: 25px; font-size: 0.85em; color: #666; }
        .footer span { color: #d4af37; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="about.html">👤 من أنا؟</a>
        <a href="links.html">🔗 روابط</a>
        <a href="calculator.html">🧮 آلة حاسبة</a>
        <a href="upload.html" class="active">☁️ رفع ملفات</a>
        <a href="http://tmmamfiles.infinityfreeapp.com" target="_blank">☁️ استضافة الملفات</a>
        <a href="http://tmmamtech.blogspot.com" target="_blank">📰 المدونة</a>
    </nav>

    <div class="main-content">
        <div class="upload-container">
            <h2>☁️ رفع الملفات</h2>
            <p class="subtitle">ارفع ملفاتك واحصل على رابط تحميل مؤقت</p>

            <div class="drop-zone" id="dropZone">
                <div class="icon">📁</div>
                <p>اسحب وأفلت الملفات هنا</p>
                <p>أو <span class="browse">اختر من جهازك</span></p>
            </div>
            <input type="file" id="fileInput" multiple>

            <div class="file-list" id="fileList"></div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <button class="btn" id="uploadBtn" disabled>رفع الملفات 🚀</button>

            <div class="result" id="resultBox">
                <p style="color:#d4af37; margin-bottom:5px;">✅ تم الرفع بنجاح!</p>
                <p id="resultLink"></p>
            </div>

            <div class="footer">
                تصميم — <span>tmmam تمام ❤️</span>
            </div>
        </div>
    </div>

    <script>
        // ===== خلفية شبكية =====
        (function() {
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            let w, h;
            const particles = [];
            const particleCount = 40;
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    r: Math.random() * 1.5 + 0.5
                });
            }
            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.strokeStyle = "#d4af37";
                ctx.fillStyle = "rgba(212,175,55,0.3)";
                ctx.lineWidth = 0.5;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 110) {
                            ctx.globalAlpha = 0.08 * (1 - dist / 110);
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ===== رفع الملفات =====
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const fileList = document.getElementById("fileList");
        const uploadBtn = document.getElementById("uploadBtn");
        const progressContainer = document.getElementById("progressContainer");
        const progressFill = document.getElementById("progressFill");
        const resultBox = document.getElementById("resultBox");
        const resultLink = document.getElementById("resultLink");
        let selectedFiles = [];

        dropZone.addEventListener("click", () => fileInput.click());
        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("drag-active");
        });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-active"));
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("drag-active");
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener("change", () => handleFiles(fileInput.files));

        function handleFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            renderFileList();
            uploadBtn.disabled = selectedFiles.length === 0;
            resultBox.style.display = "none";
        }

        function renderFileList() {
            fileList.innerHTML = "";
            selectedFiles.forEach((file, index) => {
                const item = document.createElement("div");
                item.className = "file-item";
                item.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">📄 ${file.name}</span>
                        <span class="file-size">${formatSize(file.size)}</span>
                    </div>
                    <button class="remove-file" onclick="removeFile(${index})">✕</button>
                `;
                fileList.appendChild(item);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
            uploadBtn.disabled = selectedFiles.length === 0;
        }

        function formatSize(bytes) {
            if (bytes === 0) return "0 بايت";
            const sizes = ["بايت", "ك.ب", "م.ب", "ج.ب"];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + " " + sizes[i];
        }

        uploadBtn.addEventListener("click", async () => {
            if (selectedFiles.length === 0) return;
            uploadBtn.disabled = true;
            progressContainer.style.display = "block";
            progressFill.style.width = "0%";
            resultBox.style.display = "none";
            resultLink.innerHTML = "";

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const formData = new FormData();
                formData.append("file", file);

                try {
                    const response = await fetch("https://0x0.st", {
                        method: "POST",
                        body: formData
                    });
                    if (response.ok) {
                        const link = await response.text();
                        resultLink.innerHTML += `<a href="${link.trim()}" target="_blank">${file.name}</a><br>`;
                    } else {
                        resultLink.innerHTML += `❌ فشل رفع ${file.name}<br>`;
                    }
                } catch (err) {
                    resultLink.innerHTML += `❌ خطأ في رفع ${file.name}<br>`;
                }
                progressFill.style.width = ((i + 1) / selectedFiles.length) * 100 + "%";
            }

            resultBox.style.display = "block";
            uploadBtn.disabled = false;
            selectedFiles = [];
            renderFileList();
            progressContainer.style.display = "none";
        });
    </script>
</body>
</html>
